name: CI - Validate Infrastructure and dbt Code

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Terraform Init (no backend, just plugin download)
        working-directory: ./terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive

  dbt-parse:
    name: dbt Parse Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.8.0

      - name: Create dummy profiles.yml for parsing
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          banking_dbt:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "dummy_account"
                user: "dummy_user"
                password: "dummy_password"
                role: ACCOUNTADMIN
                database: BANKING_DWH
                warehouse: COMPUTE_WH
                schema: STAGING
                threads: 4
          EOF

      - name: dbt parse (syntax check only, no real connection)
        working-directory: ./dbt_project
        run: dbt parse --profiles-dir ~/.dbt